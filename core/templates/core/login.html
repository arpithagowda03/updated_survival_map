<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SurvivalMap — Admin Login</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#080c14;--surface:#0f1825;--card:#141e2e;--border:#1e2d45;--accent:#00d4aa;--accent2:#ff6b35;--danger:#ff3b5c;--text:#e8f0fe;--muted:#7a8fa6;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Space Grotesk',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
.bg-grid{position:absolute;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:60px 60px;opacity:.25;}
.bg-glow{position:absolute;inset:0;background:radial-gradient(ellipse 60% 50% at 50% 50%,rgba(0,212,170,.06),transparent);}
.login-box{position:relative;z-index:2;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:44px 40px;width:100%;max-width:420px;}
.login-logo{font-family:'Syne',sans-serif;font-size:1.6rem;font-weight:800;color:var(--accent);text-align:center;margin-bottom:6px;}
.login-logo span{color:var(--accent2);}
.login-sub{text-align:center;color:var(--muted);font-size:0.85rem;margin-bottom:32px;}
.admin-pill{display:inline-block;padding:4px 14px;background:rgba(255,107,53,.12);border:1px solid rgba(255,107,53,.3);border-radius:20px;font-size:.75rem;font-weight:700;color:var(--accent2);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;}
.form-group{margin-bottom:16px;}
.form-group label{display:block;font-size:.82rem;color:var(--muted);margin-bottom:6px;font-weight:500;}
.form-group input{width:100%;padding:12px 14px;background:var(--card);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-size:.95rem;font-family:inherit;outline:none;transition:border-color .2s;}
.form-group input:focus{border-color:var(--accent);}
.login-btn{width:100%;padding:13px;background:var(--accent);color:#000;border:none;border-radius:10px;font-size:1rem;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s;margin-top:4px;}
.login-btn:hover{background:#00f5c4;transform:translateY(-1px);box-shadow:0 8px 25px rgba(0,212,170,.25);}
.error-msg{background:rgba(255,59,92,.1);border:1px solid rgba(255,59,92,.3);border-radius:8px;padding:10px 14px;font-size:.85rem;color:var(--danger);margin-bottom:16px;}
.login-footer{text-align:center;margin-top:24px;font-size:.82rem;color:var(--muted);}
.login-footer a{color:var(--accent);text-decoration:none;}
.login-footer a:hover{text-decoration:underline;}
.creds-hint{background:rgba(0,212,170,.06);border:1px solid rgba(0,212,170,.2);border-radius:8px;padding:10px 14px;font-size:.8rem;color:var(--muted);margin-top:16px;text-align:center;}
.creds-hint strong{color:var(--accent);}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-glow"></div>
<div class="login-box">
  <div style="text-align:center;margin-bottom:8px"><span class="admin-pill">Admin Access</span></div>
  <div class="login-logo">Survival<span>Map</span></div>
  <div class="login-sub">Sign in to manage resources and volunteers</div>

  {% if form.errors %}
  <div class="error-msg">⚠️ Invalid username or password. Please try again.</div>
  {% endif %}

  <form method="post">
    {% csrf_token %}
    <input type="hidden" name="next" value="{{ next }}">
    <div class="form-group">
      <label>Username</label>
      <input type="text" name="username" placeholder="admin" autofocus autocomplete="username">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" name="password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button type="submit" class="login-btn">🔐 Sign In to Dashboard</button>
  </form>

  <div class="creds-hint">
    Default credentials: <strong>admin</strong> / <strong>admin123</strong><br>
    <small>(Change after first login)</small>
  </div>

  <div class="login-footer">
    <a href="/">← Back to SurvivalMap</a> &nbsp;·&nbsp;
    <a href="/map/">User Map</a>
  </div>
</div>
</body>
</html>
